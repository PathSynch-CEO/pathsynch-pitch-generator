name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid queueing duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege — no write permissions by default
permissions:
  contents: read

jobs:
  test:
    name: Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: functions

    steps:
      # TODO: upgrade to actions/checkout@v5 and actions/setup-node@v5 when available (Node 20 deprecation)
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Security audit
        # Accept moderate transitive vulns from firebase-admin/google SDK — only block on critical
        run: npm audit --audit-level=critical

  emulator-tests:
    # F-601: run the emulator-backed rules suites (P0 share-leak prevention + Gate #7
    # tenant isolation) against the real firestore.rules, so a rules regression is
    # caught before merge. These are excluded from the mocked `npm test` run above.
    name: Emulator Tests (rules)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Java (Firestore emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run emulator-backed rules tests
        run: npm run test:emulator

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [test]
    # F-701: CI auto-deploy DISABLED. Merges to main were auto-deploying all functions to
    # production — unreviewed, on deprecated FIREBASE_TOKEN auth, from a runner without
    # functions/.env. Deploys are manual/local (with .env + FUNCTIONS_DISCOVERY_TIMEOUT=120)
    # until functions/.env is injected from a secret / Secret Manager (F-701 proper fix) AND
    # CI auth moves off FIREBASE_TOKEN to a service account / WIF (F-702). Re-enable by
    # restoring the original condition:
    #   github.ref == 'refs/heads/main' && github.event_name == 'push'
    if: false
    timeout-minutes: 20
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions --project pathsynch-pitch-creation --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
